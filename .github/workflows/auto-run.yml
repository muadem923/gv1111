name: Bot Xao Nau M3U

on:
  schedule:
    # Cứ mỗi phút thứ 0 của các giờ (tức 1 tiếng 1 lần) bot sẽ tự chạy
    - cron: '08,39 * * * *'
  workflow_dispatch: # Nút bấm thủ công

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy Repo về
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài thư viện tải file
        run: pip install requests

      - name: Thả Bot đi chôm và xào link
        run: python main.py

      - name: Đẩy thành phẩm lên lại GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add gavang_live.m3u
          git commit -m "Bot auto update link Gà Vàng" || exit 0
          git push
