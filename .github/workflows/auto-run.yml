name: Auto Update Gavang M3U

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy code từ Repo về
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài đặt thư viện Playwright (Trình duyệt ảo)
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4
          playwright install chromium
          playwright install-deps

      - name: Chạy con Robot đi gom link
        run: python main.py

      - name: Lưu và Đẩy file M3U
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Tự động cập nhật M3U [skip ci]" || exit 0
          git push
